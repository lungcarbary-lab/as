<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>유튜브 썸네일 디자이너 | 의뢰 받습니다</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
        * {
            margin: 0;
            padding: 0;
        }
        
        body, html {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow: auto;
        }
        
        .main-image {
            cursor: pointer;
            display: block;
        }
        
        /* PC 버전 - 원본 크기 */
        .main-image {
            width: auto;
            height: auto;
            max-width: none;
        }

        /* 모바일 버전 - 화면에 맞춤 */
        @media (max-width: 768px) {
            .main-image {
                width: 100% !important;     /* 모바일에서는 가로 100% */
                height: auto;
                max-width: 100% !important;
            }
        }

        .main-image:hover {
            opacity: 0.95;
        }
    </style>
</head>
</head>
<body>

    <a href="https://t.me/BKloan" target="_blank">
        <img src="https://i.postimg.cc/w9bbQsMW/gwang-goimiji.png"
             alt="메인 이미지" 
             class="main-image">
    </a>

</body>

</body>
</html>
